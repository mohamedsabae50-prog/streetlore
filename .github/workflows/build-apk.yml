name: Build Release APK

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (aab)
        run: flutter build appbundle --release

      - name: Copy APK to artifacts folder
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/streetlore-release.apk
          cp build/app/outputs/bundle/release/app-release.aab artifacts/streetlore-release.aab

      - name: Get APK size
        run: |
          echo "APK size: $(du -h artifacts/streetlore-release.apk | cut -f1)"
          echo "AAB size: $(du -h artifacts/streetlore-release.aab | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: streetlore-release-apk
          path: artifacts/streetlore-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: streetlore-release-aab
          path: artifacts/streetlore-release.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/streetlore-release.apk
            artifacts/streetlore-release.aab
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
