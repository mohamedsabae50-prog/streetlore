name: streetlore
description: Discover the unseen stories of your city with Streetlore.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  url_launcher: ^6.3.2

  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  http: ^1.2.0
  image_picker: ^1.2.3
  path_provider: ^2.1.6

  google_generative_ai: ^0.4.4
  supabase_flutter: ^2.5.6
  supabase: ^2.5.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.2.1
  permission_handler: ^11.3.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-400.ttf
          weight: 400
        - asset: assets/fonts/Cairo-400.ttf
          weight: 500
        - asset: assets/fonts/Cairo-400.ttf
          weight: 600
        - asset: assets/fonts/Cairo-400.ttf
          weight: 700
